{% extends 'base.html' %}

{% block title %}Eliminar Dirección | Odette{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 border-top border-danger border-4 text-center p-5">
                <h3 class="text-danger mb-4"><i class="bi bi-trash fs-1 d-block mb-2"></i> Eliminar Dirección</h3>
                <p class="lead">¿Deseas eliminar la dirección <strong>"{{ object.alias }}"</strong>?</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'direccion_list' %}" class="btn btn-secondary me-2 px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
