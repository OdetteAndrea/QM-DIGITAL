{% extends 'base.html' %}

{% block title %}Dirección | Odette{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4 font-serif text-brand">
                        {% if object %}Editar Dirección{% else %}Nueva Dirección{% endif %}
                    </h3>
                    <form method="post" class="custom-form">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'direccion_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-brand">Guardar Dirección</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
